spring:
  application:
    name: community-backend
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

community:
  jwt:
    secret: ${COMMUNITY_JWT_SECRET:CommunityServiceBackendJwtSecretKey2026!}
    expire-minutes: 120
    issuer: community-service
  file-storage:
    default-type: ${COMMUNITY_STORAGE_TYPE:LOCAL}
    local-base-path: ${COMMUNITY_LOCAL_STORAGE_PATH:./storage}
    local-access-base-url: /api/files
    max-file-size-bytes: 20971520
  analytics:
    enabled: ${COMMUNITY_ANALYTICS_ENABLED:true}
    max-corpus-per-source: ${COMMUNITY_ANALYTICS_MAX_CORPUS_PER_SOURCE:300}
    word-cloud-top-n: ${COMMUNITY_ANALYTICS_WORD_CLOUD_TOP_N:80}
    min-word-frequency: ${COMMUNITY_ANALYTICS_MIN_WORD_FREQUENCY:2}
    report:
      daily-cron: ${COMMUNITY_ANALYTICS_DAILY_CRON:0 30 8 * * ?}
      weekly-cron: ${COMMUNITY_ANALYTICS_WEEKLY_CRON:0 0 9 ? * MON}
      zone: ${COMMUNITY_ANALYTICS_ZONE:Asia/Shanghai}
  ai:
    enabled: ${COMMUNITY_AI_ENABLED:false}
    base-url: ${COMMUNITY_AI_BASE_URL:https://api.openai.com/v1}
    api-key: ${COMMUNITY_AI_API_KEY:}
    model: ${COMMUNITY_AI_MODEL:gpt-4o-mini}
    timeout-ms: ${COMMUNITY_AI_TIMEOUT_MS:10000}
